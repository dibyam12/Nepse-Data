services:
  - type: web
    name: nepse-data-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn nepse_api.wsgi --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: RENDER
        value: "True"
      - key: CRON_SECRET_KEY
        sync: false

  # ──────────────────────────────────────────────────────────────────────
  # CRON JOBS — handled by cron-job.org (Render free tier has no cron)
  #
  # Configure at https://cron-job.org with:
  #
  #   Daily stock scrape (5:15 PM NPT / 11:30 UTC, Sun-Thu):
  #     URL:    https://<your-app>.onrender.com/api/trigger-scrape/?key=<CRON_SECRET_KEY>
  #     Method: GET
  #     Schedule: 30 11 * * 0-4
  #
  #   Weekly calendar + reports (Sunday 5:45 PM NPT / 12:00 UTC):
  #     URL:    https://<your-app>.onrender.com/api/trigger-scrape/?key=<CRON_SECRET_KEY>&tasks=all
  #     Method: GET
  #     Schedule: 0 12 * * 0
  #
  #   Keep-alive ping (every 14 min to prevent Render sleep):
  #     URL:    https://<your-app>.onrender.com/api/ping/
  #     Method: GET
  #     Schedule: */14 * * * *
  # ──────────────────────────────────────────────────────────────────────
